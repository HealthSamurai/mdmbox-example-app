params:
  firstName:
    type: string
  lastName:
    type: string
  birthdate:
    type: string
  phone:
    type: string
  email:
    type: string
  id:
    type: string
  _count:
    type: integer
    default: 10
  _page:
    type: integer
    default: 1
query: |
  SELECT
    p.id,
    p.resource#>>'{name,0,given,0}' AS "firstName",
    p.resource#>>'{name,0,family}' AS "lastName",
    p.resource#>>'{birthDate}' AS "birthDate",
    p.resource#>>'{gender}' AS gender,
    jsonb_path_query_first(p.resource, '$.telecom[*] ? (@.system == "phone").value') #>> '{}' AS "phoneNumber",
    jsonb_path_query_first(p.resource, '$.telecom[*] ? (@.system == "email").value') #>> '{}' AS email,
    p.resource#>>'{address,0,line,0}' AS street,
    p.resource#>>'{address,0,city}' AS city,
    p.resource#>>'{address,0,state}' AS state,
    p.resource#>>'{address,0,postalCode}' AS zip,
    p.resource#>>'{address,0,country}' AS country,
    count(e.*) AS encounters
  FROM patient p
  LEFT JOIN encounter e ON p.id = e.resource#>>'{subject,id}'
  WHERE
    (cast({{params.firstName}} as text) IS NULL OR immutable_unaccent_upper(p.resource#>>'{name,0,given,0}') = immutable_unaccent_upper(cast({{params.firstName}} as text)))
    AND (cast({{params.lastName}} as text) IS NULL OR immutable_unaccent_upper(p.resource#>>'{name,0,family}') = immutable_unaccent_upper(cast({{params.lastName}} as text)))
    AND (cast({{params.birthdate}} as text) IS NULL OR p.resource#>>'{birthDate}' = cast({{params.birthdate}} as text))
    AND (cast({{params.phone}} as text) IS NULL OR extract_and_normalize_phones(p.resource) @> array[immutable_optimize_phone_number(cast({{params.phone}} as text))])
    AND (cast({{params.email}} as text) IS NULL OR jsonb_path_query_array(p.resource, '$.telecom[*] ? (@.system == "email").value'::jsonpath) @> to_jsonb(array[cast({{params.email}} as text)]))
    AND (cast({{params.id}} as text) IS NULL OR p.id = cast({{params.id}} as text))
  GROUP BY p.id, p.resource
  ORDER BY p.id
  LIMIT {{params._count}}
  OFFSET ({{params._page}} - 1) * {{params._count}}
count-query: |
  SELECT count(*) FROM patient p
  WHERE
    (cast({{params.firstName}} as text) IS NULL OR immutable_unaccent_upper(p.resource#>>'{name,0,given,0}') = immutable_unaccent_upper(cast({{params.firstName}} as text)))
    AND (cast({{params.lastName}} as text) IS NULL OR immutable_unaccent_upper(p.resource#>>'{name,0,family}') = immutable_unaccent_upper(cast({{params.lastName}} as text)))
    AND (cast({{params.birthdate}} as text) IS NULL OR p.resource#>>'{birthDate}' = cast({{params.birthdate}} as text))
    AND (cast({{params.phone}} as text) IS NULL OR extract_and_normalize_phones(p.resource) @> array[immutable_optimize_phone_number(cast({{params.phone}} as text))])
    AND (cast({{params.email}} as text) IS NULL OR jsonb_path_query_array(p.resource, '$.telecom[*] ? (@.system == "email").value'::jsonpath) @> to_jsonb(array[cast({{params.email}} as text)]))
    AND (cast({{params.id}} as text) IS NULL OR p.id = cast({{params.id}} as text))
type: query
omit-sql: true
